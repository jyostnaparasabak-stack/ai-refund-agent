version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: refund-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - refund-net

  frontend:
    build:
      context: ./frontend
    container_name: refund-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - refund-net

networks:
  refund-net:
    driver: bridge